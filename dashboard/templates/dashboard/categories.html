{% extends 'dashboard/index.html' %}

{% block cat %}
<div class="container mx-auto px-4 py-8">
    <div class="card-body">
        <div class="flex flex-wrap justify-between items-center">
            <div class="form-control w-full md:w-1/3">
                <div class="input-group">
            <span class="bg-base-300">
              <i class="ti ti-search"></i>
            </span>
                    <input type="text" placeholder="Search User" class="input input-bordered w-full">
                </div>
            </div>
            <div class="flex flex-wrap justify-end space-x-2 w-full md:w-2/3">
                <div class="dropdown">
                    <label tabindex="0" class="btn m-1">
                        <i class="ti ti-package-export mr-2"></i>Add new product
                    </label>
                </div>
                <button class="btn btn-primary">
                    <i class="ti ti-square-rounded-plus mr-2"></i>Export The File
                </button>
            </div>
        </div>
    </div>
</div>
<div class="container mx-auto px-4 py-8 shadow-2xl my-40">
    <h1 class="text-3xl font-bold mb-6">Categories</h1>
    
    <div class="overflow-x-auto">
        <table class="table table-zebra w-full">
            <thead>
                <tr>
                    <th class="bg-primary text-primary-content">Category Name</th>
                    <th class="bg-primary text-primary-content">Category Safe Url</th>
                    <th class="bg-primary text-primary-content">Parent of Category</th>
                    <th class="bg-primary text-primary-content">Category status</th>
                </tr>
            </thead>
            <tbody>
                {% for item in items %}
                <tr class="hover:bg-gray-100">
                    <td>{{ item.name }}</td>
                    <td>{{ item.slug }}</td>
                    <td>{{ item.parent }}</td>
                    <td>{{ item.is_active }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
